# Model and API Configuration for PaperVizAgent

# Default Models (must not be empty — used for all generation calls)
defaults:
  main_model_name: "gpt-5.4-2026-03-05"
  image_gen_model_name: "gpt-image-1.5"

# API Keys. If you are using all OpenAI models, you can leave the other keys empty.
api_keys:
  openai_api_key: "" # e.g. "sk-xxxxxxxxxxxxx"
  google_api_key: ""
  anthropic_api_key: ""
  openrouter_api_key: "" # e.g. "sk-or-v1-xxxxx". Set model_name to "openrouter/<model>" to use.
